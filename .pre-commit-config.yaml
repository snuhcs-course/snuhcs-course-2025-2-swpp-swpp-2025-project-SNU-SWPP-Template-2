# Pre-commit hooks configuration
# See https://pre-commit.com for more information

repos:
  # General hooks for all files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=10000']  # 10MB limit
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python formatting and linting with Ruff (fast, modern, replaces black+isort+flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      # Ruff linter - replaces flake8, isort checks
      - id: ruff
        name: ruff lint and fix
        args: [--fix, --exit-non-zero-on-fix, --config=pyproject.toml]
        files: ^(backend|ai-model)/.*\.py$

      # Ruff formatter - replaces black
      - id: ruff-format
        name: ruff format
        args: [--config=pyproject.toml]
        files: ^(backend|ai-model)/.*\.py$

  # Security scanning (optional - can be slow, disabled by default)
  # Uncomment to enable security scanning in pre-commit
  # - repo: https://github.com/PyCQA/bandit
  #   rev: 1.7.5
  #   hooks:
  #     - id: bandit
  #       files: ^(backend|ai-model)/.*\.py$
  #       args: [-ll, -r]
  #       exclude: ^(backend|ai-model)/tests/.*$

  # Kotlin formatting and linting
  - repo: https://github.com/pinterest/ktlint
    rev: 0.50.0
    hooks:
      - id: ktlint
        files: ^frontend/.*\.(kt|kts)$
        args: [--format]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.37.0
    hooks:
      - id: markdownlint
        files: \.md$
        args: [--fix]

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.3
    hooks:
      - id: prettier
        files: \.(yaml|yml|json)$
        args: [--write]

  # Custom hooks for project-specific checks
  - repo: local
    hooks:
      # Python test runner
      - id: python-tests
        name: Run Python tests
        entry: bash -c 'cd backend && python -m pytest tests/ --tb=short -q'
        language: system
        files: ^(backend|ai-model)/.*\.py$
        pass_filenames: false
        stages: [push]  # Only run on push, not on every commit

      # Python security check
      - id: python-safety-check
        name: Python security check
        entry: bash -c 'pip-audit --desc --format=text'
        language: system
        files: ^(backend|ai-model)/.*\.py$
        pass_filenames: false
        stages: [push]

      # Check for secrets
      - id: check-secrets
        name: Check for secrets
        entry: bash -c 'grep -r -i -E "(password|secret|key|token|api_key)" --include="*.py" --include="*.kt" --include="*.yaml" --include="*.json" --exclude-dir=".git" --exclude-dir="venv" --exclude-dir="node_modules" . || true'
        language: system
        pass_filenames: false
        stages: [commit]

      # Ensure ruff is available
      - id: check-formatters
        name: Check ruff is available
        entry: bash -c 'python -m ruff --version >/dev/null 2>&1 && echo "✅ Ruff available" || (echo "❌ Ruff not found. Run: pip install ruff" && exit 1)'
        language: system
        pass_filenames: false
        always_run: true

      # Custom Python formatter with ruff (can be run manually)
      - id: custom-python-format-ruff
        name: Custom Python formatter (ruff)
        entry: python tools/formatters/format_python.py --use-ruff
        language: system
        files: ^(backend|ai-model)/.*\.py$
        pass_filenames: false
        stages: [manual]  # Only run when explicitly called with: pre-commit run custom-python-format-ruff

      # Custom Python formatter with traditional tools (can be run manually)
      - id: custom-python-format-traditional
        name: Custom Python formatter (black+isort+flake8)
        entry: python tools/formatters/format_python.py
        language: system
        files: ^(backend|ai-model)/.*\.py$
        pass_filenames: false
        stages: [manual]  # Only run when explicitly called with: pre-commit run custom-python-format-traditional

      # Custom Kotlin formatter (can be run manually)
      - id: custom-kotlin-format
        name: Custom Kotlin formatter
        entry: bash tools/formatters/format_kotlin.sh
        language: system
        files: ^frontend/.*\.(kt|kts)$
        pass_filenames: false
        stages: [manual]  # Only run when explicitly called with: pre-commit run custom-kotlin-format

# Configuration for specific hooks
default_language_version:
  python: python3

# Exclude patterns
exclude: |
  (?x)^(
    .*\.min\.(js|css)$|
    .*\.map$|
    .*/migrations/.*$|
    .*/node_modules/.*$|
    .*/venv/.*$|
    .*/\.venv/.*$|
    .*/__pycache__/.*$|
    .*/build/.*$|
    .*/dist/.*$|
    .*\.egg-info/.*$|
    .*/\.git/.*$|
    .*/\.pytest_cache/.*$|
    .*/\.mypy_cache/.*$|
    .*\.pyc$|
    .*\.pyo$|
    .*\.pyd$|
    .*\.so$|
    .*\.dll$
  )$

# Minimum pre-commit version
minimum_pre_commit_version: 3.0.0

# Fail fast - stop running hooks after first failure
fail_fast: false

# Default stages for hooks
default_stages: [commit, push]
